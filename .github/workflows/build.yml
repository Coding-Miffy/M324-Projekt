name: Build Todo App
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: coding-miffy
jobs:
  test-java-api:
    name: Test Java Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Run tests
        working-directory: Backend
        run: mvn clean test -B
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: Backend/target/surefire-reports/*.xml
          reporter: java-junit

  test-react-app:
    name: Test React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      - name: Run tests
        working-directory: Frontend
        run: npm run test -- --watchAll=false --passWithNoTests
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Tests
          path: Frontend/reports/junit.xml
          reporter: java-junit

  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    needs: [test-react-app]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install
      - name: Build frontend
        working-directory: Frontend
        run: npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist

  backend-build:
    name: Build Java Backend
    runs-on: ubuntu-latest
    needs: [test-java-api]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build backend with Maven
        working-directory: Backend
        run: mvn clean package -DskipTests -B
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend/target/*.jar

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/todo-backend:latest
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/todo-frontend:latest